name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────
  # 1. Lint & Validate
  # ─────────────────────────────────────────────
  lint:
    name: 🔍 Lint & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install HTML validator (html-validate)
        run: npm install -g html-validate

      - name: Install CSS linter (stylelint)
        run: npm install -g stylelint stylelint-config-standard

      - name: Validate HTML files
        run: |
          echo "🔍 Validating HTML..."
          html-validate index.html || true

      - name: Lint CSS files
        run: |
          echo "🎨 Linting CSS..."
          stylelint "css/**/*.css" --config '{"extends":["stylelint-config-standard"]}' || true

      - name: Check for console.error and debugger statements
        run: |
          echo "🔎 Checking for debug statements..."
          if grep -rn "debugger" js/ ; then
            echo "❌ debugger statement found!"
            exit 1
          fi
          echo "✅ No debug statements found"

  # ─────────────────────────────────────────────
  # 2. File Structure Check
  # ─────────────────────────────────────────────
  structure:
    name: 📁 File Structure Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify required files exist
        run: |
          echo "📁 Checking required files..."
          required_files=("index.html" "css/main.css" "css/game.css" "vercel.json")
          for file in "${required_files[@]}"; do
            if [ -f "$file" ]; then
              echo "✅ $file exists"
            else
              echo "❌ $file is missing!"
              exit 1
            fi
          done
          echo "✅ All required files present"

      - name: Check file sizes (warn if large)
        run: |
          echo "📊 Checking file sizes..."
          find . -name "*.js" -not -path "./.git/*" -exec ls -lh {} \; | awk '{print $5, $9}'
          find . -name "*.css" -not -path "./.git/*" -exec ls -lh {} \; | awk '{print $5, $9}'

  # ─────────────────────────────────────────────
  # 3. Deploy to Vercel (main branch only)
  # ─────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [lint, structure]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel (Production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          echo "🚀 Deploying to Vercel..."
          vercel --prod --yes \
            --token=$VERCEL_TOKEN

      - name: Comment deployment URL
        if: success()
        run: |
          echo "✅ Deployment successful!"
          echo "🌐 Site is live on Vercel"
